<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - Groceria</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/pages/register.css">

</head>

<body>

    <!-- ===== CONTAINER ===== -->
    <main class="register-container">


        <!-- ===== LEFT SIDE ===== -->
        <section class="register-left">

            <img src="../assets/img/register-banner.jpg" alt="Register Groceria">

        </section>


        <!-- ===== RIGHT SIDE ===== -->
        <section class="register-right">

            <h1>Buat Akun Baru</h1>

            <p>
                Daftar sekarang dan nikmati pengalaman belanja sehat bersama Groceria.
            </p>


            <!-- ===== FORM ===== -->
            <form>

                <!-- Nama -->
                <label>Nama Lengkap</label>

                <input
                    type="text"
                    id="nama"
                    placeholder="Masukkan nama lengkap"
                >


                <!-- Email -->
                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Masukkan email"
                >


                <!-- Password -->
                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Masukkan password"
                >


                <!-- Konfirmasi Password -->
                <label>Konfirmasi Password</label>

                <input
                    type="password"
                    id="confirm-password"
                    placeholder="Konfirmasi password"
                >


                <!-- Button -->
                <button type="button" onclick="register()">
                    Register
                </button>

            </form>


            <!-- Login Link -->
            <div class="login-link">

                Sudah punya akun?
                <a href="login.html">
                    Login sekarang
                </a>

            </div>

        </section>

    </main>


    <!-- JS -->
    <script src="../assets/js/modules/register.js"></script>

</body>
</html>
